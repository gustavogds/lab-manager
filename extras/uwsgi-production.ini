[uwsgi]
# === Master process ===
master = true
enable-threads = true

# === Caminhos do projeto ===
chdir = /opt/lab-manager/app/server
home = /opt/lab-manager/app/.venv

# === Modulo WSGI ===
module = config.wsgi:application

# === Variaveis de ambiente ===
env = LANG=en_US.UTF-8
env = LC_ALL=en_US.UTF-8
env = LC_CTYPE=en_US.UTF-8
env = DJANGO_SETTINGS_MODULE=config.settings
env = PYTHON_ENV=production

# === Socket Unix (Nginx se comunica por aqui) ===
socket = /opt/lab-manager/app/server/storage/lab-manager.sock
chmod-socket = 660

# === Workers (processos e threads) ===
# Regra geral: processes = (2 * num_cpus) + 1
# Para um servidor com 2 CPUs: 5 processos
# Ajuste conforme seu servidor
processes = 3
threads = 2

# === Limites de seguranca ===
max-requests = 5000
max-requests-delta = 200
harakiri = 120
harakiri-verbose = true

# === Gerenciamento de processos ===
die-on-term = true
reload-mercy = 60
worker-reload-mercy = 60
vacuum = true

# === Offloading (para servir arquivos estaticos sem bloquear workers) ===
offload-threads = 4

# === Buffer para headers grandes ===
buffer-size = 65535

# === Logging ===
logdate = [%%Y-%%m-%%dT%%H:%%M:%%S.000Z]
logformat = %(ftime) (%(addr)) %(method) %(uri) => %(status) in %(msecs)ms reqlen:%(cl) reslen:%(rsize) pid:%(pid)
logformat-strftime = true
logto = /opt/lab-manager/app/server/storage/logs/uwsgi.log
log-maxsize = 10485760

# === PID file para gerenciamento ===
pidfile = /opt/lab-manager/app/server/storage/uwsgi.pid

# === Nao ativar auto-reload em producao ===
# py-auto-reload = 0 (descomentado pois ja e o default)