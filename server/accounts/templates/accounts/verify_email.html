<!DOCTYPE html>
<html lang="{{ t.html_lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ t.title }}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f7; padding: 40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background-color: #4f46e5; padding: 32px 40px; text-align: center;">
              <h1 style="margin: 0; color: #ffffff; font-size: 22px; font-weight: 600;">
                {{ t.title }}
              </h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding: 36px 40px;">
              <p style="margin: 0 0 16px; color: #333333; font-size: 16px; line-height: 1.5;">
                {{ t.greeting }}, <strong>{{ user_name }}</strong>!
              </p>
              <p style="margin: 0 0 24px; color: #555555; font-size: 15px; line-height: 1.6;">
                {{ t.intro }}
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto 24px;">
                <tr>
                  <td style="border-radius: 6px; background-color: #4f46e5;">
                    <a href="{{ verification_url }}" target="_blank"
                       style="display: inline-block; padding: 14px 32px; color: #ffffff; font-size: 15px; font-weight: 600; text-decoration: none; border-radius: 6px;">
                      {{ t.button }}
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin: 0 0 12px; color: #555555; font-size: 14px; line-height: 1.5;">
                {{ t.fallback }}
              </p>
              <p style="margin: 0 0 24px; word-break: break-all; color: #4f46e5; font-size: 13px;">
                {{ verification_url }}
              </p>
              <p style="margin: 0; color: #999999; font-size: 13px; line-height: 1.5;">
                {{ t.expiry }}
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color: #f9fafb; padding: 20px 40px; text-align: center; border-top: 1px solid #eaeaea;">
              <p style="margin: 0; color: #aaaaaa; font-size: 12px;">
                {{ t.footer }}
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
